name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  backend-and-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Create backend environment file
        run: |
          cat > .env << 'EOF'
          DJANGO_SECRET_KEY=github-actions-dev-secret
          DJANGO_DEBUG=True
          DJANGO_ALLOWED_HOSTS=127.0.0.1,localhost
          USE_SQLITE=True
          POSTGRES_DB=insightops_db
          POSTGRES_USER=insightops_user
          POSTGRES_PASSWORD=insightops_password
          POSTGRES_HOST=localhost
          POSTGRES_PORT=5432
          LLM_PROVIDER=stub
          DEFAULT_EMBEDDING_PROVIDER=stub
          OPENAI_API_KEY=
          EOF

      - name: Run Django check
        working-directory: backend
        run: python manage.py check

      - name: Run Django test suite
        working-directory: backend
        run: python manage.py test

      - name: Run pytest
        working-directory: backend
        run: pytest

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Run frontend unit tests
        working-directory: frontend
        run: npm run test

      - name: Build frontend
        working-directory: frontend
        run: npm run build
