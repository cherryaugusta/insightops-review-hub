services:
  db:
    image: postgres:16-alpine
    container_name: insightops-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: insightops_db
      POSTGRES_USER: insightops_user
      POSTGRES_PASSWORD: insightops_password
    ports:
      - "5432:5432"
    volumes:
      - insightops_postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: insightops-backend
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DJANGO_SECRET_KEY: django-insecure-docker-dev-only-change-me
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: 127.0.0.1,localhost,backend
      USE_SQLITE: "False"
      POSTGRES_DB: insightops_db
      POSTGRES_USER: insightops_user
      POSTGRES_PASSWORD: insightops_password
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      LLM_PROVIDER: stub
      DEFAULT_EMBEDDING_PROVIDER: stub
      OPENAI_API_KEY: ""
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: insightops-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  insightops_postgres_data:
